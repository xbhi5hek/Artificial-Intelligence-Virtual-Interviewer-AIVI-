{% extends "base.html" %}

{% block content %}
<div class="hero">
    <div class="glass auth-card">
        <h2 style="margin-bottom: 2rem; font-size: 2rem;">Join AIVI Pro</h2>
        <form method="POST">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="username" required placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="name@company.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
        </form>
        <p style="margin-top: 1.5rem; font-size: 0.875rem;">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--primary);">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
